<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      text-align: center;
    }
    .card {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      font-size: 16px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Selamat Ulang Tahun 🎉</h1>
  <p id="message">Untuk kamu yang paling spesial di hidup aku ❤️</p>
  <button onclick="playMusic()">Putar Lagu 🎵</button>
</div>

<audio id="music" src="lagu.mp3"></audio>

<script>
  function playMusic() {
    const music = document.getElementById('music');
    music.play();
  }

  // EDIT PESAN DI SINI
  document.getElementById('message').innerText = "Selamat ulang tahun sayangku ❤️ Semoga kamu selalu bahagia, sehat, dan tetap bersama aku selamanya 💕";
</script>

</body>
</html>
